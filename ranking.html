<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CN Portal — Ranking Geral</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root{
  --azul:#003366;--azul-mid:#004d99;--azul-light:#1a6abf;--ouro:#c9a84c;--ouro-light:#e8c96a;
  --bg:#02060f;--surface:#080e1a;--surface2:#0d1526;--surface3:#111d35;
  --border:rgba(255,255,255,0.08);--text:#e8edf5;--text-muted:#8a96b3;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.header{position:sticky;top:0;z-index:20;background:rgba(2,6,15,0.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.logo{display:flex;align-items:center;gap:10px;color:var(--text);text-decoration:none;font-family:'Syne',sans-serif;font-weight:800}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--azul-mid),var(--azul-light));display:flex;align-items:center;justify-content:center}
.logo span{color:var(--ouro)}
.nav{display:flex;gap:10px;align-items:center}
.nav a{color:var(--text-muted);text-decoration:none;font-size:14px;padding:8px 12px;border-radius:8px}
.nav a:hover{background:var(--surface3);color:var(--text)}
.main{max-width:800px;margin:0 auto;padding:34px 20px 64px}
.hero{padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:28px;text-align:center;}
.eyebrow{color:var(--ouro);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
h1{font-family:'Syne',sans-serif;font-size:clamp(30px,4vw,42px);line-height:1.05;letter-spacing:0;margin-bottom:14px}
.lead{max-width:880px;margin: 0 auto;color:var(--text-muted);font-size:17px}

.ranking-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.ranking-item{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--border)}
.ranking-item:last-child{border-bottom:none}
.ranking-pos{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.ranking-pos.p1{background:rgba(201,168,76,0.15);color:var(--ouro); font-size: 20px;}
.ranking-pos.p2{background:rgba(192,192,192,0.15);color:#c0c0c0; font-size: 20px;}
.ranking-pos.p3{background:rgba(205,127,50,0.15);color:#cd7f32; font-size: 20px;}
.ranking-pos.pn{background:var(--surface2);color:var(--text-muted)}
.ranking-pos.me{background:rgba(0,77,153,0.2);color:var(--azul-light)}
.ranking-nome{flex:1;font-size:16px;font-weight:500}
.ranking-nome.me{color:var(--azul-light);font-weight:700}
.ranking-pts{font-size:16px;font-weight:700;color:var(--ouro); background:rgba(201,168,76,0.1); padding: 4px 12px; border-radius: 100px;}
.ranking-sep{text-align:center;font-size:11px;color:var(--text-muted);padding:8px 0}
@media(max-width:860px){
  .header{padding:0 16px}
  .nav a{padding:7px 8px}
}
</style>
</head>
<body>
<header class="header">
  <a href="portal.html" class="logo"><span class="logo-icon">⚗️</span>CN <span>Portal</span></a>
  <nav class="nav">
    <a href="portal.html">Dashboard</a>
    <a href="revisao.html">Revisão</a>
    <a href="simulado.html">Simulado</a>
    <a href="teoria.html">Teoria</a>
  </nav>
</header>

<main class="main">
  <section class="hero">
    <div class="eyebrow">Ranking Geral</div>
    <h1>Top Alunos</h1>
    <p class="lead">Os estudantes com maior pontuação nas questões de revisão e nos simulados.</p>
  </section>

  <div class="ranking-card">
    <div id="rankingList">
      <div style="text-align:center;color:var(--text-muted);font-size:14px;padding:40px">Carregando ranking...</div>
    </div>
  </div>
</main>

<script>
  const sb = supabase.createClient(CN_CONFIG.supabase.url, CN_CONFIG.supabase.anonKey);
  let userAtual = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }
    userAtual = session.user;
    carregarRankingFull();
  }

  async function carregarRankingFull() {
    const { data: ranking, error } = await sb.rpc('get_ranking');
    const list = document.getElementById('rankingList');
    
    if (error || !ranking || ranking.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:14px;padding:40px">Nenhuma pontuação registrada ainda.</div>';
      return;
    }

    let html = '';
    
    ranking.forEach((r, index) => {
      const pos = Number(r.posicao) || (index + 1); // get_ranking returns 'posicao'
      const classe = pos === 1 ? 'p1' : pos === 2 ? 'p2' : pos === 3 ? 'p3' : 'pn';
      const icone = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : `${pos}º`;
      const euMesmo = r.aluno_id === userAtual.id;
      
      html += `
        <div class="ranking-item">
          <div class="ranking-pos ${classe} ${euMesmo && pos > 3 ? 'me' : ''}">${icone}</div>
          <div class="ranking-nome ${euMesmo ? 'me' : ''}">${r.nome}${euMesmo ? ' (você)' : ''}</div>
          <div class="ranking-pts">${Number(r.pontos_total).toLocaleString('pt-BR')} XP</div>
        </div>`;
    });

    list.innerHTML = html;
  }

  init();
</script>
</body>
</html>
